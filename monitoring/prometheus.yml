global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: "koyalai-local"
    environment: "development"

rule_files: []   

scrape_configs:

  # KoyalAI FastAPI backend — /metrics via prometheus_client.make_asgi_app()
  # PrometheusMiddleware excludes /metrics from HTTP instrumentation recording.
  - job_name: "koyal_backend"
    static_configs:
      # - targets: ["backend:8000"]    # for backend running in docker
      - targets: ["192.168.1.34:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s

  # Qdrant vector store — native Prometheus metrics
  - job_name: "qdrant"
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: "/metrics"
    scrape_interval: 30s

  # Redis Prometheus exporter — memory, ops/sec, keyspace, replication lag
  - job_name: "redis_exporter"
    static_configs:
      - targets: ["redis_exporter:9121"]
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    metrics_path: "/metrics"
    scrape_interval: 60s