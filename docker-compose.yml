services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: koyalai_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"       # gRPC port — available for future async client / health probes
    volumes:
      - koyalai_qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: koyalai_redis
    ports:
      - "6379:6379"
    volumes:
      - koyalai_redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: koyal_backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./data:/app/data:ro

volumes:
  koyalai_qdrant_storage:
    driver: local
  koyalai_redis_data:
    driver: local
