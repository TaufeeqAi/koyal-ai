  #   environment:
  #     QDRANT_HOST: qdrant
  #     QDRANT_PORT: "6333"
  #     REDIS_HOST: redis
  #     REDIS_PORT: "6379"
  #     LANGFUSE_BASE_URL: "http://langfuse-web:3000"
  #     LANGFUSE_HOST: "http://langfuse-web:3000"
  #     LANGFUSE_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-pk-lf-koyalai-local}
  #     LANGFUSE_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-sk-lf-koyalai-local}
  #   depends_on:
  #     qdrant:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     langfuse-web:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   volumes:
  #     - ./data:/app/data:ro

volumes:
  koyalai_qdrant_storage:
    driver: local
  koyalai_redis_data:
    driver: local
  postgres_langfuse_data:
    driver: local
  clickhouse_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local