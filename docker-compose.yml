# KoyalAI Full Stack 
#
# Services:
#   qdrant (vector store)
#   redis (caching, sessions, cost tracker)
#   langfuse-web, langfuse-worker, postgres-langfuse, clickhouse, minio
#            prometheus, grafana, redis_exporter
#   livekit-server, livekit-sip, koyal-worker
#
#
# Startup order:
#   1. Infrastructure: qdrant, redis, postgres-langfuse, clickhouse, minio
#   2. Init: minio-init
#   3. Observability: langfuse-web, langfuse-worker, prometheus, grafana
#   4. Telephony: livekit-server 
#   5. Telephony: livekit-sip (depends on livekit-server)
#   6. Workers: koyal-worker (depends on livekit-server)
#
# Port Mapping Summary:
#   3001  — Langfuse Web UI
#   3002  — Grafana
#   6333  — Qdrant REST
#   6334  — Qdrant gRPC
#   7880  — LiveKit WebSocket signaling 
#   7881  — LiveKit TCP RTC fallback
#   7882  — LiveKit UDP RTC media 
#   8000  — KoyalAI Backend (FastAPI) 
#   9010  — MinIO API
#   9011  — MinIO Console
#   9090  — Prometheus
#   9121  — Redis Exporter
#   5060  — SIP signaling (UDP/TCP) 
#   10000-10100 — RTP media range
# ───────────────────────────────────────────────────────────────────────────

x-langfuse-common-env: &langfuse-common-env
  DATABASE_URL: postgresql://langfuse:langfuse@postgres-langfuse:5432/langfuse
  NEXTAUTH_URL: http://localhost:3001
  NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-YpNqDPpjUi9Eryf30JLTh5ikrUqX1lNm9WuWB8osKOc=}
  SALT: ${LANGFUSE_SALT:-WfCCs3BqJK+IladDkC+J8kwX5jWw9jp0kEsMdNh3ZBA=}
  # ENCRYPTION_KEY: REQUIRED for v3. 64-char hex. Generate: openssl rand -hex 32
  ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-65b9e3d4276058732695e1b14c0a46e7147bc23a3af84901435d39d9393fc052}
  # ClickHouse — OLAP analytics store for traces
  CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
  CLICKHOUSE_URL: http://clickhouse:8123
  CLICKHOUSE_USER: clickhouse
  CLICKHOUSE_PASSWORD: clickhouse
  CLICKHOUSE_CLUSTER_ENABLED: "false"
  # Redis — async worker queue (shared with cost tracker)
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_AUTH: ""
  # MinIO — S3-compatible event/media storage
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
  TELEMETRY_ENABLED: "false"
  LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
  # Auto-provision org/project/keys on first boot (no manual UI setup)
  LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-koyalai-org}
  LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-KoyalAI}
  LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-koyalai-project}
  LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-KoyalAI Production}
  LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-pk-lf-koyalai-local}
  LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-sk-lf-koyalai-local}
  LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@koyalai.io}
  LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-Admin}
  LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-koyalai2026admin}

services:

  # ═══════════════════════════════════════════════════════════════════════
  # DATA INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════════

  # ── Vector Store ───────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: koyalai_qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - koyalai_qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: koyalai_redis
    ports:
      - "6379:6379"
    volumes:
      - koyalai_redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis Exporter ─────────────────────────────────────────────────────
  redis_exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: koyal_redis_exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════
  # OBSERVABILITY (Langfuse + Prometheus + Grafana)
  # ═══════════════════════════════════════════════════════════════════════

  # ── Langfuse Postgres ──────────────────────────────────────────────────
  postgres-langfuse:
    image: postgres:15-alpine
    container_name: koyal_langfuse_postgres
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - postgres_langfuse_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── ClickHouse ─────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: koyal_clickhouse
    environment:
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DB: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9001:9000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ── MinIO ──────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: koyal_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9010:9000"
      - "127.0.0.1:9011:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── MinIO Init ─────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: koyal_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/langfuse &&
        echo 'MinIO: langfuse bucket ready'
      "
    restart: "no"

  # ── Langfuse Web ───────────────────────────────────────────────────────
  langfuse-web:
    image: langfuse/langfuse:3
    container_name: koyal_langfuse_web
    ports:
      - "3001:3000"
    environment:
      <<: *langfuse-common-env
      NODE_OPTIONS: "--max-old-space-size=2048"
    depends_on:
      postgres-langfuse:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "-q", "http://localhost:3000/api/public/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  # ── Langfuse Worker ────────────────────────────────────────────────────
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: koyal_langfuse_worker
    environment:
      <<: *langfuse-common-env
      NODE_OPTIONS: "--max-old-space-size=1024"
    depends_on:
      postgres-langfuse:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: koyal_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Grafana ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.0
    container_name: koyal_grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: koyal2026
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/etc/grafana/provisioning/dashboards/koyal_dashboard.json"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════
  # LIVEKIT TELEPHONY
  # ═══════════════════════════════════════════════════════════════════════

  # ── LiveKit Server ─────────────────────────────────────────────────────
  # WebRTC signaling hub. Manages rooms, participants, tracks, and JWT auth.
  # Mounts livekit/livekit.yaml for all configuration.
  #
  # Healthcheck: HTTP GET / on port 7880
  # Depends on: redis (for distributed room state)
  livekit-server:
    image: livekit/livekit-server:latest
    container_name: koyal_livekit
    ports:
      - "7880:7880"       # WebSocket signaling (ws://localhost:7880)
      - "7881:7881"       # TCP RTC fallback (corporate firewalls)
      - "7882:7882/udp"   # UDP RTC primary media path (SRTP/DTLS)
    volumes:
      # Mount the livekit/ folder config into container
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    command:
      - "--config"
      - "/etc/livekit.yaml"
      - "--dev"
      - "--node-ip"
      - "host.docker.internal"
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  # ── LiveKit SIP Bridge ─────────────────────────────────────────────────
  # PSTN gateway: translates SIP signaling + RTP media ↔ LiveKit WebRTC.
  # Uses livekit/sip/config.yaml for SIP-specific settings.
  # Also accepts env vars as fallback/override.
  #
  # Port 5060: SIP signaling (UDP primary, TCP fallback)
  # Ports 10000-10100: RTP media (2 ports per call = ~25 concurrent dev calls)
  #
  # Healthcheck: HTTP GET /healthz on port 8080 (SIP container internal)
  # Depends on: livekit-server (must be healthy), redis (session state)
  livekit-sip:
    image: livekit/sip:latest
    container_name: koyal_livekit_sip
    ports:
      - "5060:5060/udp"                # SIP signaling UDP (primary)
      - "5060:5060/tcp"                # SIP signaling TCP (fallback)
      - "10000-10100:10000-10100/udp"  # RTP media port range
    volumes:
      # Mount SIP-specific config
      - ./livekit/sip/config.yaml:/sip/config.yaml:ro
    environment:
      # These OVERRIDE values in config.yaml if both are set
      # Keeping them explicit ensures the container starts even if mount fails
      LIVEKIT_URL: "ws://livekit-server:7880"
      LIVEKIT_API_KEY: "devkey"
      LIVEKIT_API_SECRET: "secret"
      # SIP service logging level
      SLOG_LEVEL: "info"
    depends_on:
      livekit-server:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  # ── Koyal Worker (livekit-agents) ──────────────────────────────────────
  # Long-lived worker process that registers with livekit-server.
  # Dispatches one JobContext (one audio bridge) per incoming room.
  #
  # Scales horizontally: run N workers for N concurrent calls.
  # HPA target in: koyal_active_calls Prometheus metric.
  #
  # Entrypoint: backend/telephony/worker.py
  #   - Uses livekit-agents WorkerOptions + cli.run_app()
  #   - Creates LiveKitAudioBridge per room
  #   - Runs full STT → LangGraph → TTS pipeline
  #
  # Depends on: livekit-server (signaling), qdrant (RAG), redis (sessions)
  # koyal-worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.backend
  #   container_name: koyal_livekit_worker
  #   command:
  #     - "python"
  #     - "-m"
  #     - "backend.telephony.worker"
  #     - "start"
  #   env_file: .env
  #   environment:
  #     # LiveKit connection (must match livekit-server keys:)
  #     LIVEKIT_URL: "ws://livekit-server:7880"
  #     LIVEKIT_API_KEY: "devkey"
  #     LIVEKIT_API_SECRET: "secret"
  #     QDRANT_HOST: qdrant
  #     REDIS_HOST: redis
  #   depends_on:
  #     livekit-server:
  #       condition: service_healthy
  #     qdrant:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   volumes:
  #     - ./data:/app/data:ro

  # ═══════════════════════════════════════════════════════════════════════
  # BACKEND 
  # ═══════════════════════════════════════════════════════════════════════
  # Uncomment for production deployment where uvicorn runs in container.
  # For development: run `uvicorn backend.main:app --reload --port 8000`
  # separately so FastAPI auto-reload works with host filesystem changes.
  #
  # backend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.backend
  #   container_name: koyal_backend
  #   ports:
  #     - "8000:8000"
  #   env_file: .env
  #   environment:
  #     QDRANT_HOST: qdrant
  #     QDRANT_PORT: "6333"
  #     REDIS_HOST: redis
  #     REDIS_PORT: "6379"
  #     LANGFUSE_BASE_URL: "http://langfuse-web:3000"
  #     LANGFUSE_HOST: "http://langfuse-web:3000"
  #     LANGFUSE_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-pk-lf-koyalai-local}
  #     LANGFUSE_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-sk-lf-koyalai-local}
  #     # LiveKit credentials for SIP provisioning and token issuance
  #     LIVEKIT_API_KEY: "devkey"
  #     LIVEKIT_API_SECRET: "secret"
  #     LIVEKIT_WS_URL: "ws://livekit-server:7880"
  #     LIVEKIT_SIP_TRUNK_ID: ${LIVEKIT_SIP_TRUNK_ID:-}
  #   depends_on:
  #     qdrant:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     langfuse-web:
  #       condition: service_healthy
  #     livekit-server:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   volumes:
  #     - ./data:/app/data:ro

volumes:
  koyalai_qdrant_storage:
    driver: local
  koyalai_redis_data:
    driver: local
  postgres_langfuse_data:
    driver: local
  clickhouse_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local