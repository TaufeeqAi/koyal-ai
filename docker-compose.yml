services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: koyalai_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"       # gRPC port — available for future async client / health probes
    volumes:
      - koyalai_qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: koyalai_redis
    ports:
      - "6379:6379"
    volumes:
      - koyalai_redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  koyalai_qdrant_storage:
    driver: local
  koyalai_redis_data:
    driver: local
